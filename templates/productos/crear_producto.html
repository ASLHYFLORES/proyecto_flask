{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="card shadow p-4" style="border-radius: 20px; max-width: 500px; margin: auto;">
        <h2 style="color: #d63384;">🍰 Nuevo Dulce</h2>
        <form action="/productos/crear" method="POST">
            <div class="mb-3">
                <label class="form-label">Nombre del Producto</label>
                <input type="text" name="nombre" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Precio</label>
                <input type="number" step="0.01" name="precio" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Stock</label>
                <input type="number" name="stock" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-danger w-100">Guardar Producto</button>
        </form>
    </div>
</div>
{% endblock %}
