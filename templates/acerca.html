{% extends "base.html" %}

{% block content %}
<style>
    /* Estilos personalizados para lograr el efecto de tu foto */
    body {
        background-color: #ffeef2 !important; /* Fondo rosa muy pálido */
        font-family: 'Poppins', sans-serif;
    }

    .acerca-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 80vh; /* Centrado vertical */
        text-align: center;
    }

    .coquette-card {
        background-color: #ffffff;
        padding: 40px 60px;
        border-radius: 25px; /* Bordes muy redondeados */
        box-shadow: 0 10px 30px rgba(0,0,0,0.05); /* Sombra suave */
        width: 100%;
        max-width: 500px; /* Ancho controlado de la tarjeta */
    }

    .main-title {
        color: #d63384; /* Rosa intenso para el título */
        font-weight: bold;
        font-size: 2.5rem;
        margin-bottom: 20px;
    }

    .info-item {
        margin-bottom: 15px;
        color: #555;
    }

    .info-label {
        font-weight: bold;
        color: #333;
    }
</style>

<div class="container acerca-container">
    
    <div class="mb-3" style="font-size: 5rem;">
        🍰
    </div>

    <h1 class="main-title">Información del Proyecto</h1>
    
    <div class="coquette-card mt-3">
        <div class="info-item">
            <span class="info-label">Materia:</span> Desarrollo de Aplicaciones Web
        </div>
        <div class="info-item">
            <span class="info-label">Tecnologías:</span> Python + Flask + MySQL
        </div>
        <div class="info-item">
            <span class="info-label">Diseño:</span> Estilo Pastel Coquette
        </div>
        <div class="info-item mt-3">
            <span class="info-label">Universidad:</span> State University of the Amazon (UEA)
        </div>
    </div>

    <div class="mt-4">
        <a href="{{ url_for('index') }}" class="btn btn-sm text-muted" style="border-radius: 20px;">
            <i class="fas fa-arrow-left"></i> Volver al Inicio
        </a>
    </div>

</div>
{% endblock %}
