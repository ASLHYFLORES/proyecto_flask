<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inventario Dulce</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body style="background-color: #fff0f5;">
    <div class="container mt-5">
        <h2 style="color: #d81b60;">Inventario de Repostería 🍰</h2>
        <a href="{{ url_for('index') }}" class="btn btn-secondary mb-3">Volver al Inicio</a>
        <a href="{{ url_for('reporte_pdf') }}" class="btn btn-danger mb-3">Descargar PDF</a>
        
        <table class="table table-hover shadow-sm bg-white rounded">
            <thead style="background-color: #ffb6c1;">
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Precio</th>
                    <th>Stock</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody>
                {% for p in productos %}
                <tr>
                    <td>{{ p.id_producto }}</td>
                    <td>{{ p.nombre }}</td>
                    <td>${{ p.precio }}</td>
                    <td>{{ p.stock }}</td>
                    <td>
                        <a href="{{ url_for('eliminar', id=p.id_producto) }}" class="btn btn-sm btn-outline-danger" onclick="return confirm('¿Eliminar este dulce?')">Borrar</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
